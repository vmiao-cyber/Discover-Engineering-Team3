<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Engineering AI Chatbot - USC Discover Engineering</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Poppins:wght@600;700&display=swap');
        body { font-family: 'Inter', sans-serif; }
        h1, h2 { font-family: 'Poppins', sans-serif; }
    </style>
</head>
<body class="bg-stone-50 min-h-screen flex flex-col">

    <!-- Header -->
    <header class="bg-[#990000] text-white py-4 px-6 shadow-md flex justify-between items-center">
        <div class="flex items-center gap-3">
            <i class="fa-solid fa-graduation-cap text-2xl text-[#FFC72C]"></i>
            <div>
                <h1 class="text-lg font-bold leading-none">USC Viterbi</h1>
                <p class="text-xs text-[#FFC72C] font-semibold tracking-wider">DISCOVER ENGINEERING</p>
            </div>
        </div>
        <div class="text-right">
            <span class="bg-[#800000] text-xs font-semibold px-3 py-1 rounded-full border border-[#FFC72C]/40">AI Chatbot Project</span>
        </div>
    </header>

    <!-- Main Content -->
    <main class="flex-grow max-w-4xl w-full mx-auto p-4 flex flex-col gap-4">

        <!-- API Key Input Panel -->
        <div class="bg-white border border-stone-200 rounded-xl p-4 shadow-sm">
            <h2 class="text-sm font-semibold text-stone-700 mb-2 flex items-center gap-2">
                <i class="fa-solid fa-key text-amber-500"></i> Setup Local Credentials
            </h2>
            <div class="flex flex-col sm:flex-row gap-2">
                <input
                    type="password"
                    id="apiKeyInput"
                    placeholder="Paste your Gemini API Key here..."
                    class="flex-grow border border-stone-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-[#990000] bg-stone-50"
                />
                <button
                    onclick="saveKey()"
                    class="bg-stone-800 hover:bg-stone-900 text-white font-medium px-4 py-2 rounded-lg text-sm transition"
                >
                    Save Key Locally
                </button>
            </div>
            <p class="text-xs text-stone-500 mt-2">
                Your key stays in your browser only. It is never uploaded to GitHub.
            </p>
        </div>

        <!-- Chat Window -->
        <div class="flex-grow bg-white border border-stone-200 rounded-xl shadow-md flex flex-col overflow-hidden min-h-[400px]">

            <!-- Bot Header -->
            <div class="bg-stone-50 border-b border-stone-200 px-6 py-4 flex items-center gap-3">
                <div class="w-10 h-10 rounded-full bg-[#990000]/10 flex items-center justify-center text-[#990000]">
                    <i id="botIcon" class="fa-solid fa-robot text-lg"></i>
                </div>
                <div>
                    <h2 id="botTitle" class="font-bold text-stone-800 text-base">CivicBot (Civil &amp; Env.)</h2>
                    <span class="text-xs text-green-600 font-semibold flex items-center gap-1">
                        <span class="w-2 h-2 rounded-full bg-green-500 inline-block animate-pulse"></span> Active
                    </span>
                </div>
            </div>

            <!-- Message Area -->
            <div id="chatHistory" class="flex-grow p-6 overflow-y-auto space-y-4 max-h-[380px]">
                <div class="flex gap-3 max-w-[80%]">
                    <div class="w-8 h-8 rounded-full bg-[#990000]/10 flex items-center justify-center text-[#990000] shrink-0">
                        <i class="fa-solid fa-robot text-sm"></i>
                    </div>
                    <div class="bg-stone-100 text-stone-800 p-3.5 rounded-2xl rounded-tl-none text-sm">
                        Fight On! I am your team's engineering advisor bot. Paste your API key above, then ask me anything about our field.
                    </div>
                </div>
            </div>

            <!-- Input Bar -->
            <div class="border-t border-stone-200 p-4 bg-stone-50 flex gap-2">
                <input
                    type="text"
                    id="userInput"
                    placeholder="Ask a question about our engineering field..."
                    class="flex-grow border border-stone-300 rounded-xl px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-[#990000]"
                    onkeydown="if(event.key === 'Enter') sendMessage()"
                />
                <button
                    onclick="sendMessage()"
                    class="bg-[#990000] hover:bg-[#800000] text-white font-bold p-3 px-5 rounded-xl text-sm transition duration-150 flex items-center justify-center"
                >
                    <i class="fa-solid fa-paper-plane"></i>
                </button>
            </div>
        </div>
    </main>

    <script>
        // ==========================
        // EDIT THIS SECTION WEEKLY
        // ==========================
        const BOT_CONFIG = {
            title: "PulseBot (Biomedical & Electrical)",
            iconClass: "fa-solid fa-helmet-safety",

            systemPrompt: `You are PulseBot, an expert in Biomedical and Electrical Engineering at USC Viterbi. You explain concepts like pacemakers, prosthetics, medical
sensors,
and digital circuits in a way high school students can understand. You are
high-energy
and scientific but never talk down to people. Focus on how engineering
saves lives.
When asked questions related to factual information, provide accurate and concise answers. If you don't know the answer, say "I can't provide an accurate response for this question.", and suggest a related topic.
If prompted regarding mathematical responses such as calculations, formulas, or equations, provide a step-by-step solution with clear explanations while keeping it concise. Also make sure equations/formulas are written with LaTeX formatting.
Keep answers to 3 short paragraphs, add a fourth paragraph at then end that applies the knowledge of the answer to the clients answer and ask follow-up questions.
You are able to decrease the amount of paragraphs if necessary. End every response with: Fight On!`
        };
        // ==========================
        // END OF EDITABLE SECTION
        // ==========================

        // Apply config to UI
        document.getElementById('botTitle').innerText = BOT_CONFIG.title;
        document.getElementById('botIcon').className = BOT_CONFIG.iconClass;

        // Save API key to browser memory
        function saveKey() {
            const key = document.getElementById('apiKeyInput').value.trim();
            if (key) {
                localStorage.setItem('gemini_api_key', key);
                alert('Key saved. You are ready to go.');
                document.getElementById('apiKeyInput').value = '';
            } else {
                alert('Please paste a valid API key first.');
            }
        }

        // Auto-detect if a key is already saved
        window.onload = function () {
            if (localStorage.getItem('gemini_api_key')) {
                document.getElementById('apiKeyInput').placeholder = 'Key already saved. Paste a new one to update it.';
            }
        };

        // Send a message to the AI
        async function sendMessage() {
            const apiKey = localStorage.getItem('gemini_api_key');
            if (!apiKey) {
                alert('Please paste your Gemini API key into the credentials panel first.');
                return;
            }

            const inputField = document.getElementById('userInput');
            const userText = inputField.value.trim();
            if (!userText) return;

            appendMessage(userText, 'user');
            inputField.value = '';

            const loadingId = appendMessage('Thinking...', 'loading');

            try {
                const response = await fetch(
                    `https://generativelanguage.googleapis.com/v1beta/models/gemini-3.1-flash-lite:generateContent?key=${apiKey}`,
                    {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            contents: [
                                { role: 'user', parts: [{ text: userText }] }
                            ],
                            systemInstruction: {
                                parts: [{ text: BOT_CONFIG.systemPrompt }]
                            },
                            generationConfig: {
                                maxOutputTokens: 500,
                                temperature: 0.7
                            }
                        })
                    }
                );

                const data = await response.json();
                document.getElementById(loadingId).remove();

                if (response.ok) {
                    const replyText = data.candidates[0].content.parts[0].text;
                    appendMessage(replyText, 'bot');
                } else {
                    const errMsg = data.error ? data.error.message : 'Unknown error.';
                    appendMessage('Error: ' + errMsg, 'error');
                }

            } catch (err) {
                document.getElementById(loadingId).remove();
                appendMessage('Connection error: ' + err.message, 'error');
            }
        }

        // Render a message bubble
        function appendMessage(text, sender) {
            const chatHistory = document.getElementById('chatHistory');
            const id = 'bubble-' + Date.now();
            const div = document.createElement('div');
            div.id = id;

            if (sender === 'user') {
                div.className = 'flex justify-end gap-3 max-w-[85%] ml-auto';
                div.innerHTML = `
                    <div class="bg-[#990000] text-white p-3.5 rounded-2xl rounded-tr-none text-sm shadow-sm">
                        ${text}
                    </div>`;
            } else if (sender === 'bot') {
                div.className = 'flex gap-3 max-w-[85%]';
                div.innerHTML = `
                    <div class="w-8 h-8 rounded-full bg-[#990000]/10 flex items-center justify-center text-[#990000] shrink-0">
                        <i class="${BOT_CONFIG.iconClass} text-sm"></i>
                    </div>
                    <div class="bg-stone-100 text-stone-800 p-3.5 rounded-2xl rounded-tl-none text-sm shadow-sm whitespace-pre-line">
                        ${text}
                    </div>`;
            } else if (sender === 'loading') {
                div.className = 'flex gap-3 max-w-[85%] animate-pulse';
                div.innerHTML = `
                    <div class="w-8 h-8 rounded-full bg-stone-200 flex items-center justify-center text-stone-400 shrink-0">
                        <i class="fa-solid fa-spinner animate-spin text-sm"></i>
                    </div>
                    <div class="bg-stone-100 text-stone-500 p-3 rounded-2xl rounded-tl-none text-sm italic">
                        ${text}
                    </div>`;
            } else if (sender === 'error') {
                div.className = 'flex justify-center w-full';
                div.innerHTML = `
                    <div class="bg-red-50 text-red-700 border border-red-200 p-3 rounded-xl text-xs flex items-center gap-2 max-w-[90%]">
                        <i class="fa-solid fa-triangle-exclamation"></i>
                        <span>${text}</span>
                    </div>`;
            }

            chatHistory.appendChild(div);
            chatHistory.scrollTop = chatHistory.scrollHeight;
            return id;
        }
    </script>

</body>
</html>
